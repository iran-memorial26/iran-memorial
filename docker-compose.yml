services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: iran_memorial
      POSTGRES_USER: memorial
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var required}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorial -d iran_memorial"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memorial-net

  meili:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY env var required}
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memorial-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - memorial-net

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL env var required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:5555:3000"
    environment:
      DATABASE_URL: postgresql://memorial:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var required}@db:5432/iran_memorial
      MEILI_HOST: http://meili:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY env var required}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      meili:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - memorial-net

volumes:
  pgdata:
  meilidata:

networks:
  memorial-net:
    name: memorial-net
