# Cloudflare-only ingress for <DEPLOYMENT_DOMAIN>
#
# WHY: Cloudflare's WAF / DDoS / rate-limit only fire when traffic actually
# transits Cloudflare. If the Hetzner origin IP (<ORIGIN_IP>)
# is reachable directly, every CF defense is bypassable. See
# docs/SECURITY-AUDIT-2026-05-13.md (P0 #2).
#
# HOW TO USE:
#   1. Refresh the IP-list files via scripts/refresh-cloudflare-ips.sh (cron daily).
#   2. Include this file inside the `server { ... }` block of the
#      <DEPLOYMENT_DOMAIN> vhost on /etc/nginx/sites-enabled/.
#      Example:
#        server {
#            listen 443 ssl http2;
#            listen [::]:443 ssl http2;
#            server_name <DEPLOYMENT_DOMAIN>;
#            include /etc/nginx/snippets/cloudflare-only.conf;
#            ...
#        }
#   3. Test: nginx -t && systemctl reload nginx
#   4. Verify: curl -k https://<ORIGIN_IP>/  → expect 403
#              curl -I <DEPLOYMENT_URL>/  → expect 200/307
#
# FALLBACK: If Cloudflare IP-list cron breaks and a new CF range appears,
# legitimate traffic from that range will get a 403. Mitigation = cron alerts
# + the temporary `allow all` line at the bottom (currently commented).

# IPv4 ranges — refreshed from https://www.cloudflare.com/ips-v4
include /etc/nginx/snippets/cloudflare-ips-v4.conf;

# IPv6 ranges — refreshed from https://www.cloudflare.com/ips-v6
include /etc/nginx/snippets/cloudflare-ips-v6.conf;

# Localhost (for health-checks, monit, certbot http-01 challenge if needed)
allow 127.0.0.1;
allow ::1;

# Hetzner SSH-jumphost / monitoring (optional — uncomment + add real IP if used)
# allow YOUR.OPS.IP.HERE;

# Emergency bypass — uncomment ONLY if you've broken the CF IP cron and need
# the site reachable while you fix it. Remove before going to bed.
# allow all;

deny all;

# Trust the real client IP from Cloudflare (paired with the CF-Connecting-IP
# precedence in lib/api-auth.ts and lib/mcp-rate-limit.ts).
real_ip_header CF-Connecting-IP;
real_ip_recursive on;
# Same IP-set as the allow list — these are the ranges we trust to set the
# real-IP header.
include /etc/nginx/snippets/cloudflare-ips-v4-set-real-ip.conf;
include /etc/nginx/snippets/cloudflare-ips-v6-set-real-ip.conf;
